    # trusted-outlets slot (techpolicy.press / cdt.org / themarkup.org) was
    # dropped — all three already arrive via RSS.
    - 'government passes a new artificial intelligence law or AI act'
    - 'first major enforcement action or penalty under an AI law'
    - 'court ruling on AI copyright, training data, or open-source licensing'
    - 'lawsuit or ruling over AI violating individual rights'
    - 'new academic framework or prominent voice on AI ethics'
    - 'company or government moves to define or enforce AI ethics'
    - 'privacy or data-protection decision on how AI handles personal data'
    - 'data colonialism or bias in AI systems'


