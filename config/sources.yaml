# config/sources.yaml — Broadsheet
# ============================================================
# Curated source list. Edit freely — add, remove, comment out.
#
# Three ways to add a source, in order of preference:
#   1. rss_feeds         — site exposes a working RSS/Atom URL
#   2. tavily_substack   — Substack-hosted (RSS blocked on cloud IPs)
#   3. no_feed_sites     — site has no RSS or RSS is broken; fetched
#                          via Tavily site-search instead
#
# Sources are tested each run. Failed sources appear under
# "Source Alerts" in the digest and in logs/source_errors.log.
# ============================================================
#
# Source-selection rubric — every enabled entry must clear ALL four:
#   1. Alive in the last 30 days. Check the latest item before enabling.
#      Dead feeds clog source_errors.log and waste a fetch slot.
#   2. AI-relevant or AI-filterable. Whole-site feeds (e.g. Bellingcat,
#      404 Media, Axios) need `ai_only_filter: true` to drop non-AI items
#      at ingest.
#   3. Editorial signal, not aggregation. No "Top 10 AI tools" SEO content,
#      no auto-generated press-release mirrors, no LinkedIn-tier op-ed
#      farms. The person or institution behind it must have a name.
#   4. Adds something the current list doesn't already cover. Three more
#      US Big-Tech blogs is worse than one strong non-US policy voice
#      or one strong technical practitioner.
#
# Optional but strongly preferred:
#   - Non-paywalled. Paywalled stories still surface but get a 💸 badge.
#   - Named byline → add `byline: "Name"` (inherits the 2-per-author cap).
#   - Geographic / institutional diversity (UK / EU / Asia / civil-society).
# ============================================================


