    # operators. The domain (include_domains) carries the precision, so the
    # phrase only needs to be a light topic nudge.
    - name: "Anthropic News"
      domain: "anthropic.com"
      query: "new model, product announcement, or safety research"
      enabled: true

    - name: "OpenAI"
      domain: "openai.com"
      query: "new model, product announcement, or safety research"
      enabled: true

    - name: "Allen Institute for AI (AI2)"
      domain: "allenai.org"
      query: "new AI research or open model release"
      enabled: true

    # Mozilla.ai moved to Law & Ethics (Brief 20) — user treats it as a
    # privacy/ethics voice, not headline news.

  no_feed_default_queries:
    - "AI announcement"
    - "artificial intelligence"

  tavily_queries:
    # Brief 20 (2026-06-03): one tight intent per query, no operators.
    # Big News owns "big strategic state/corporate moves"; legal/regulatory
    # angles live in Law & Ethics to avoid the two categories colliding.
    - 'frontier AI lab releases a new flagship model or signals a major leap in capabilities'
    - 'major AI company IPO, merger, or large acquisition'
    - 'large corporation deploys AI at a scale that reshapes its industry or the economy'
    - 'national government AI strategy or integration of AI into public services'
    - 'military adoption of artificial intelligence or autonomous weapons'


