# -----------------------------------------------------------
# SUBSTACK VIA TAVILY
# Substack blocks cloud IPs (GitHub Actions / AWS) with 403 on RSS.
# These sources are fetched via Tavily search instead — no inbox needed.
#
# To add a new source: add an entry with domain + category.
# source_name is optional — omit to use domain as display name.
# -----------------------------------------------------------
tavily_substack:
  enabled: true
  default_category: "Commentary"
  # priority: must_include — fresh posts (≤48h) from these sources bypass the
  # normal candidate funnel and are pinned directly into the digest (1 per voice).
  sources:
    - domain: "importai.substack.com"
      source_name: "Import AI (Jack Clark)"
      category: "Big News"
      priority: must_include
    - domain: "interconnects.ai"
      source_name: "Interconnects (Nathan Lambert)"
      category: "Built & Released"
      priority: must_include
    - domain: "latent.space"
      source_name: "Latent Space (Swyx)"
      category: "Built & Released"
      priority: must_include
    - domain: "garymarcus.substack.com"
      source_name: "Gary Marcus"
      category: "Commentary"
      priority: must_include
    # --- New (2026-05-18): fallback paths for Substack-hosted RSS adds ---
    - domain: "thezvi.substack.com"
      source_name: "Don't Worry About the Vase (Zvi Mowshowitz)"
      category: "Commentary"
      priority: must_include
    - domain: "magazine.sebastianraschka.com"
      source_name: "Ahead of AI (Sebastian Raschka)"
      category: "Built & Released"
      priority: must_include
    - domain: "wheresyoured.at"
      source_name: "Where's Your Ed At (Edward Zitron)"
      category: "Commentary"
      priority: must_include
    - domain: "bloodinthemachine.com"
      source_name: "Blood in the Machine (Brian Merchant)"
      category: "Commentary"
      priority: must_include
    - domain: "theconvivialsociety.substack.com"
      source_name: "The Convivial Society (L.M. Sacasas)"
      category: "Commentary"
      priority: must_include
