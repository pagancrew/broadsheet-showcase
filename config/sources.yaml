      query: "privacy, data use, or concerns about AI"
      enabled: true

    # Brief 21 (2026-06-04): Guardian API dropped (over-constrained query returned 0
    # results silently). Now routed via Tavily no_feed_sites like every other source.
    - name: "The Guardian"
      domain: "theguardian.com"
      query: "AI regulation, policy, ethics, or law"
      enabled: true

  no_feed_default_queries:
    - "AI policy"
    - "AI regulation"

  guardian_api:
    enabled: false
    # Brief 21 (2026-06-04): disabled. Over-constrained query (section=technology
    # AND tag=law/law) returned 0 results silently. Guardian now fetched via
    # Tavily no_feed_sites above. See docs/DECISIONS.md ADR-051.
    # Original config kept for reference:
    sections:
      - "technology"
    tags:
      - "technology/artificial-intelligence"
      - "law/law"
    keywords:
      - "AI regulation"
      - "artificial intelligence law"
      - "AI Act"
      - "AI ethics"

  tavily_queries:
